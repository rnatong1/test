<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>손바닥 표정 게임</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: rgba(15, 23, 42, 0.82);
        --panel-2: rgba(30, 41, 59, 0.9);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #22c55e;
        --accent-2: #38bdf8;
        --danger: #fb7185;
        --shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 28%),
          radial-gradient(circle at top right, rgba(34, 197, 94, 0.14), transparent 24%),
          linear-gradient(160deg, #020617 0%, #0f172a 45%, #111827 100%);
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .app {
        width: min(1120px, 100%);
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 20px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid rgba(148, 163, 184, 0.16);
        border-radius: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .left {
        padding: 22px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .hero {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1;
      }

      .subtitle {
        margin-top: 10px;
        color: var(--muted);
        line-height: 1.6;
        max-width: 56ch;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .stat {
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.12);
      }

      .stat-label {
        display: block;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .stat-value {
        display: block;
        margin-top: 8px;
        font-size: 26px;
        font-weight: 700;
      }

      .camera-wrap {
        position: relative;
        overflow: hidden;
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.95), rgba(2, 6, 23, 0.95));
        min-height: 480px;
        border: 1px solid rgba(148, 163, 184, 0.16);
      }

      video,
      canvas {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      video {
        transform: scaleX(-1);
      }

      canvas.overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        transform: scaleX(-1);
      }

      .cam-hint {
        position: absolute;
        left: 16px;
        top: 16px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.72);
        border: 1px solid rgba(148, 163, 184, 0.16);
        font-size: 14px;
        color: var(--text);
      }

      .cam-state {
        position: absolute;
        right: 16px;
        top: 16px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.72);
        border: 1px solid rgba(148, 163, 184, 0.16);
        font-size: 14px;
        color: var(--muted);
      }

      .controls {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 14px;
        padding: 13px 18px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
        transform: none;
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent), #16a34a);
        color: #052e16;
      }

      .btn-secondary {
        background: rgba(148, 163, 184, 0.12);
        color: var(--text);
        border: 1px solid rgba(148, 163, 184, 0.16);
      }

      .right {
        padding: 22px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .face-card {
        flex: 1;
        display: grid;
        place-items: center;
        min-height: 420px;
        border-radius: 24px;
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.14), transparent 42%),
          linear-gradient(180deg, rgba(30, 41, 59, 0.86), rgba(15, 23, 42, 0.96));
        border: 1px solid rgba(148, 163, 184, 0.14);
        position: relative;
        overflow: hidden;
      }

      .face-card::before {
        content: "";
        position: absolute;
        inset: auto -20% -30% -20%;
        height: 220px;
        background: radial-gradient(circle, rgba(56, 189, 248, 0.18), transparent 60%);
        filter: blur(12px);
      }

      .avatar {
        width: min(320px, 82%);
        aspect-ratio: 1 / 1;
        position: relative;
        z-index: 1;
        display: grid;
        place-items: center;
      }

      .head {
        width: 100%;
        height: 100%;
        border-radius: 44% 44% 40% 40%;
        background: linear-gradient(180deg, #fde68a, #f59e0b);
        box-shadow: inset 0 -16px 28px rgba(180, 83, 9, 0.2);
        position: relative;
      }

      .head::before,
      .head::after {
        content: "";
        position: absolute;
        top: 18%;
        width: 18%;
        height: 20%;
        border-radius: 50%;
        background: rgba(234, 179, 8, 0.35);
      }

      .head::before {
        left: -5%;
      }

      .head::after {
        right: -5%;
      }

      .eye {
        position: absolute;
        top: 37%;
        width: 14%;
        height: 8%;
        border-radius: 999px;
        background: #1f2937;
      }

      .eye.left {
        left: 27%;
      }

      .eye.right {
        right: 27%;
      }

      .mouth {
        position: absolute;
        left: 50%;
        top: 62%;
        transform: translateX(-50%);
        width: 28%;
        height: 12%;
        border-bottom: 8px solid #1f2937;
        border-radius: 0 0 999px 999px;
      }

      .brow {
        position: absolute;
        top: 30%;
        width: 16%;
        height: 4%;
        border-radius: 999px;
        background: #1f2937;
        opacity: 0;
      }

      .brow.left {
        left: 24%;
      }

      .brow.right {
        right: 24%;
      }

      .cheek {
        position: absolute;
        top: 51%;
        width: 11%;
        height: 8%;
        border-radius: 50%;
        background: rgba(244, 114, 182, 0.25);
        opacity: 0;
      }

      .cheek.left {
        left: 17%;
      }

      .cheek.right {
        right: 17%;
      }

      .expression-label {
        position: absolute;
        left: 16px;
        bottom: 16px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.74);
        border: 1px solid rgba(148, 163, 184, 0.16);
        color: var(--text);
        font-size: 14px;
        z-index: 2;
      }

      .message {
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.12);
        color: var(--muted);
        line-height: 1.5;
      }

      .pulse {
        animation: pulse 0.45s ease;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        40% {
          transform: scale(1.04);
        }
        100% {
          transform: scale(1);
        }
      }

      .expr-happy .mouth {
        top: 60%;
        width: 34%;
        height: 16%;
        border-bottom-width: 10px;
      }

      .expr-surprised .mouth {
        top: 60%;
        width: 20%;
        height: 20%;
        border: 8px solid #1f2937;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.05);
      }

      .expr-angry .mouth {
        top: 66%;
        width: 24%;
        height: 4%;
        border-bottom: 8px solid #1f2937;
        border-radius: 0;
        transform: translateX(-50%) rotate(180deg);
      }

      .expr-angry .brow,
      .expr-sleepy .brow {
        opacity: 1;
      }

      .expr-angry .brow.left {
        transform: rotate(-18deg);
      }

      .expr-angry .brow.right {
        transform: rotate(18deg);
      }

      .expr-sleepy .eye {
        height: 4%;
        top: 41%;
      }

      .expr-wink .eye.right {
        height: 4%;
        top: 41%;
      }

      .expr-wink .mouth {
        width: 26%;
      }

      .expr-smile .cheek {
        opacity: 1;
      }

      .expr-default .mouth {
        width: 26%;
      }

      .tracking-on {
        color: #bbf7d0;
      }

      .tracking-off {
        color: #fecaca;
      }

      @media (max-width: 920px) {
        .app {
          grid-template-columns: 1fr;
        }

        .camera-wrap,
        .face-card {
          min-height: 360px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel left">
        <div class="hero">
          <div>
            <h1>손바닥 표정 게임</h1>
            <p class="subtitle">
              카메라 앞에서 손바닥을 펴면 성공합니다. 성공할 때마다 캐릭터 표정이 랜덤으로 바뀌고 점수가 올라갑니다.
            </p>
          </div>
        </div>

        <div class="stats">
          <div class="stat">
            <span class="stat-label">점수</span>
            <span class="stat-value" id="score">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">연속 성공</span>
            <span class="stat-value" id="streak">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">현재 표정</span>
            <span class="stat-value" id="expressionText">무표정</span>
          </div>
        </div>

        <div class="controls">
          <button class="btn-primary" id="startBtn">카메라 시작</button>
          <button class="btn-secondary" id="resetBtn" disabled>리셋</button>
        </div>

        <div class="camera-wrap">
          <video id="video" playsinline autoplay muted></video>
          <canvas id="overlay" class="overlay"></canvas>
          <div class="cam-hint">손바닥을 카메라에 보여주세요</div>
          <div class="cam-state" id="camState">대기 중</div>
        </div>

        <div class="message" id="message">
          시작 버튼을 누르면 카메라가 켜집니다. 손바닥이 인식되면 캐릭터 얼굴이 바뀝니다.
        </div>
      </section>

      <section class="panel right">
        <div class="face-card">
          <div class="avatar expr-default" id="avatar">
            <div class="head">
              <div class="brow left"></div>
              <div class="brow right"></div>
              <div class="eye left"></div>
              <div class="eye right"></div>
              <div class="cheek left"></div>
              <div class="cheek right"></div>
              <div class="mouth"></div>
            </div>
          </div>
          <div class="expression-label" id="expressionLabel">무표정</div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script>
      const video = document.getElementById("video");
      const canvas = document.getElementById("overlay");
      const ctx = canvas.getContext("2d");
      const startBtn = document.getElementById("startBtn");
      const resetBtn = document.getElementById("resetBtn");
      const scoreEl = document.getElementById("score");
      const streakEl = document.getElementById("streak");
      const expressionText = document.getElementById("expressionText");
      const expressionLabel = document.getElementById("expressionLabel");
      const avatar = document.getElementById("avatar");
      const message = document.getElementById("message");
      const camState = document.getElementById("camState");

      const expressions = [
        { name: "무표정", className: "expr-default" },
        { name: "웃음", className: "expr-smile" },
        { name: "놀람", className: "expr-surprised" },
        { name: "화남", className: "expr-angry" },
        { name: "졸림", className: "expr-sleepy" },
        { name: "윙크", className: "expr-wink" },
        { name: "활짝", className: "expr-happy" },
      ];

      let score = 0;
      let streak = 0;
      let lastSuccessAt = 0;
      let wasPalmOpen = false;
      let stream = null;
      let frameLoop = null;
      let hands = null;
      let faceMesh = null;
      let isRunning = false;
      let currentExpressionIndex = 0;

      function resizeCanvas() {
        const rect = video.getBoundingClientRect();
        canvas.width = rect.width * devicePixelRatio;
        canvas.height = rect.height * devicePixelRatio;
      }

      function setMessage(text, tone = "info") {
        message.textContent = text;
        camState.textContent = tone === "ok" ? "인식 중" : tone === "bad" ? "연결 안 됨" : "대기 중";
        camState.classList.toggle("tracking-on", tone === "ok");
        camState.classList.toggle("tracking-off", tone === "bad");
      }

      function updateStats() {
        scoreEl.textContent = String(score);
        streakEl.textContent = String(streak);
      }

      function randomExpressionIndex(excludeIndex) {
        if (expressions.length <= 1) return 0;
        let next = excludeIndex;
        while (next === excludeIndex) {
          next = Math.floor(Math.random() * expressions.length);
        }
        return next;
      }

      function applyExpression(index) {
        currentExpressionIndex = index;
        const expr = expressions[index];
        avatar.className = `avatar ${expr.className}`;
        expressionText.textContent = expr.name;
        expressionLabel.textContent = expr.name;
        avatar.classList.remove("pulse");
        void avatar.offsetWidth;
        avatar.classList.add("pulse");
      }

      function pointFromLandmark(landmarks, index) {
        return landmarks[index];
      }

      function drawFaceFilter(results) {
        if (!results.multiFaceLandmarks || !results.multiFaceLandmarks[0]) return;

        const landmarks = results.multiFaceLandmarks[0];
        const leftEye = pointFromLandmark(landmarks, 33);
        const rightEye = pointFromLandmark(landmarks, 263);
        const nose = pointFromLandmark(landmarks, 1);
        const mouthLeft = pointFromLandmark(landmarks, 61);
        const mouthRight = pointFromLandmark(landmarks, 291);
        const forehead = pointFromLandmark(landmarks, 10);
        const chin = pointFromLandmark(landmarks, 152);

        if (!leftEye || !rightEye || !nose || !mouthLeft || !mouthRight || !forehead || !chin) return;

        const width = Math.abs(rightEye.x - leftEye.x) * video.clientWidth * 1.9;
        const height = Math.abs(chin.y - forehead.y) * video.clientHeight * 1.15;
        const centerX = nose.x * video.clientWidth;
        const centerY = nose.y * video.clientHeight;

        const expr = expressions[currentExpressionIndex];
        const faceBoxW = Math.max(170, width);
        const faceBoxH = Math.max(220, height);
        const left = centerX - faceBoxW / 2;
        const top = centerY - faceBoxH / 2;

        ctx.save();

        const scaleX = video.clientWidth / video.videoWidth;
        const scaleY = video.clientHeight / video.videoHeight;
        const x = left * scaleX;
        const y = top * scaleY;
        const w = faceBoxW * scaleX;
        const h = faceBoxH * scaleY;

        ctx.globalAlpha = 0.95;
        ctx.fillStyle = "rgba(14, 165, 233, 0.10)";
        ctx.strokeStyle = "rgba(56, 189, 248, 0.70)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        if (typeof ctx.roundRect === "function") {
          ctx.roundRect(x, y, w, h, Math.min(w, h) * 0.24);
        } else {
          const r = Math.min(w, h) * 0.24;
          ctx.moveTo(x + r, y);
          ctx.lineTo(x + w - r, y);
          ctx.quadraticCurveTo(x + w, y, x + w, y + r);
          ctx.lineTo(x + w, y + h - r);
          ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
          ctx.lineTo(x + r, y + h);
          ctx.quadraticCurveTo(x, y + h, x, y + h - r);
          ctx.lineTo(x, y + r);
          ctx.quadraticCurveTo(x, y, x + r, y);
        }
        ctx.fill();
        ctx.stroke();

        const eyeY = y + h * 0.34;
        const eyeSize = Math.max(6, w * 0.045);
        const eyeGap = w * 0.18;
        const eyeLX = x + w * 0.32;
        const eyeRX = x + w * 0.68;
        const browY = y + h * 0.23;
        const mouthY = y + h * 0.64;

        ctx.strokeStyle = "#082f49";
        ctx.fillStyle = "#082f49";
        ctx.lineCap = "round";

        if (expr.className === "expr-surprised") {
          ctx.beginPath();
          ctx.arc(x + w * 0.5, mouthY, Math.max(8, w * 0.07), 0, Math.PI * 2);
          ctx.lineWidth = 8;
          ctx.stroke();
        } else if (expr.className === "expr-angry") {
          ctx.lineWidth = 8;
          ctx.beginPath();
          ctx.moveTo(eyeLX - eyeGap * 0.35, browY + 2);
          ctx.lineTo(eyeLX + eyeGap * 0.35, browY - 8);
          ctx.moveTo(eyeRX - eyeGap * 0.35, browY - 8);
          ctx.lineTo(eyeRX + eyeGap * 0.35, browY + 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(x + w * 0.38, mouthY);
          ctx.quadraticCurveTo(x + w * 0.5, mouthY - 14, x + w * 0.62, mouthY);
          ctx.stroke();
        } else if (expr.className === "expr-sleepy") {
          ctx.lineWidth = 7;
          ctx.beginPath();
          ctx.moveTo(eyeLX - eyeSize, eyeY);
          ctx.lineTo(eyeLX + eyeSize, eyeY + 1);
          ctx.moveTo(eyeRX - eyeSize, eyeY);
          ctx.lineTo(eyeRX + eyeSize, eyeY + 1);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(x + w * 0.42, mouthY);
          ctx.lineTo(x + w * 0.58, mouthY);
          ctx.stroke();
        } else if (expr.className === "expr-wink") {
          ctx.lineWidth = 7;
          ctx.beginPath();
          ctx.arc(eyeLX, eyeY, eyeSize, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(eyeRX - eyeSize, eyeY);
          ctx.lineTo(eyeRX + eyeSize, eyeY);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(x + w * 0.42, mouthY);
          ctx.quadraticCurveTo(x + w * 0.5, mouthY + 10, x + w * 0.58, mouthY);
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.arc(eyeLX, eyeY, eyeSize, 0, Math.PI * 2);
          ctx.arc(eyeRX, eyeY, eyeSize, 0, Math.PI * 2);
          ctx.fill();
          ctx.lineWidth = 8;
          ctx.beginPath();
          if (expr.className === "expr-happy" || expr.className === "expr-smile") {
            ctx.moveTo(x + w * 0.34, mouthY);
            ctx.quadraticCurveTo(x + w * 0.5, mouthY + 18, x + w * 0.66, mouthY);
          } else {
            ctx.moveTo(x + w * 0.35, mouthY);
            ctx.quadraticCurveTo(x + w * 0.5, mouthY + 10, x + w * 0.65, mouthY);
          }
          ctx.stroke();
        }

        ctx.restore();
      }

      function isPalmOpen(landmarks) {
        const wrist = landmarks[0];
        const thumbTip = landmarks[4];
        const indexTip = landmarks[8];
        const middleTip = landmarks[12];
        const ringTip = landmarks[16];
        const pinkyTip = landmarks[20];
        const indexPip = landmarks[6];
        const middlePip = landmarks[10];
        const ringPip = landmarks[14];
        const pinkyPip = landmarks[18];

        const fingersExtended =
          indexTip.y < indexPip.y &&
          middleTip.y < middlePip.y &&
          ringTip.y < ringPip.y &&
          pinkyTip.y < pinkyPip.y;

        const thumbAway = Math.abs(thumbTip.x - wrist.x) > 0.12;
        const handSpread =
          Math.abs(indexTip.x - pinkyTip.x) > 0.18 &&
          indexTip.y < wrist.y &&
          pinkyTip.y < wrist.y;

        return fingersExtended && thumbAway && handSpread;
      }

      function drawHands(results) {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.scale(devicePixelRatio, devicePixelRatio);

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
          for (const landmarks of results.multiHandLandmarks) {
            drawConnectors(ctx, landmarks, HAND_CONNECTIONS, { color: "#38bdf8", lineWidth: 4 });
            drawLandmarks(ctx, landmarks, { color: "#22c55e", lineWidth: 2, radius: 3 });
          }
        }

        ctx.restore();
      }

      function onSuccess() {
        const now = Date.now();
        if (now - lastSuccessAt < 450) return;
        lastSuccessAt = now;
        score += 1;
        streak += 1;
        updateStats();
        const nextIndex = randomExpressionIndex(currentExpressionIndex);
        applyExpression(nextIndex);
        const expr = expressions[nextIndex];
        setMessage(`성공! 손바닥이 인식되었습니다. 표정이 ${expr.name}(으)로 바뀌었어요.`, "ok");
      }

      async function startCamera() {
        if (isRunning) return;
        if (!navigator.mediaDevices?.getUserMedia) {
          setMessage("이 브라우저는 카메라 접근을 지원하지 않습니다.", "bad");
          return;
        }

        try {
          stream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: {
              facingMode: "user",
              width: { ideal: 1280 },
              height: { ideal: 720 },
            },
          });

          video.srcObject = stream;
          await video.play();

          if (!video.videoWidth) {
            await new Promise((resolve) => {
              video.addEventListener("loadedmetadata", resolve, { once: true });
            });
          }

          resizeCanvas();

          hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
          });
          faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`,
          });
          hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.6,
          });
          faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6,
          });

          hands.onResults((results) => {
            drawHands(results);
            const landmarks = results.multiHandLandmarks && results.multiHandLandmarks[0];
            if (landmarks) {
              const palmOpen = isPalmOpen(landmarks);
              if (palmOpen && !wasPalmOpen) {
                onSuccess();
              } else if (!palmOpen) {
                setMessage("손바닥이 조금 더 또렷하게 보이면 성공 판정됩니다.", "ok");
              }
              wasPalmOpen = palmOpen;
            } else {
              wasPalmOpen = false;
            }
          });

          faceMesh.onResults((results) => {
            drawFaceFilter(results);
          });

          const processFrame = async () => {
            if (!isRunning) return;
            if (video.readyState >= 2) {
              await hands.send({ image: video });
              await faceMesh.send({ image: video });
            }
            frameLoop = requestAnimationFrame(processFrame);
          };

          isRunning = true;
          frameLoop = requestAnimationFrame(processFrame);
          window.addEventListener("resize", resizeCanvas);
          startBtn.disabled = true;
          resetBtn.disabled = false;
          setMessage("카메라가 켜졌습니다. 손바닥을 펴서 표정을 바꿔보세요.", "ok");
        } catch (error) {
          console.error(error);
          stopCamera();
          startBtn.disabled = false;
          resetBtn.disabled = true;
          setMessage("카메라를 시작하지 못했습니다. 브라우저 권한을 확인해 주세요.", "bad");
        }
      }

      function resetGame() {
        score = 0;
        streak = 0;
        lastSuccessAt = 0;
        wasPalmOpen = false;
        updateStats();
        applyExpression(0);
        setMessage("리셋 완료. 다시 손바닥을 보여주세요.", "info");
      }

      function stopCamera() {
        isRunning = false;
        if (frameLoop) {
          cancelAnimationFrame(frameLoop);
          frameLoop = null;
        }
        if (stream) {
          for (const track of stream.getTracks()) {
            track.stop();
          }
          stream = null;
        }
        video.srcObject = null;
      }

      startBtn.addEventListener("click", startCamera);
      resetBtn.addEventListener("click", () => {
        resetGame();
        if (!stream) {
          setMessage("리셋 완료. 카메라를 다시 시작할 수 있어요.", "info");
        }
      });
      window.addEventListener("beforeunload", stopCamera);

      updateStats();
      applyExpression(0);
      setMessage("시작 버튼을 누르면 카메라가 켜집니다.", "info");
    </script>
  </body>
</html>
